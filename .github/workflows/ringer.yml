# Cloud mode: every 6 hours, pull new repos from the X watchlist, run the
# Ringer, and commit the fresh leaderboard. The repo itself becomes a living
# API any project or agent can read:
#   https://raw.githubusercontent.com/<owner>/GrandGitMaster/main/data/champions.json
name: The Ringer

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "seeds/**"
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ringer
  cancel-in-progress: false

jobs:
  ringer:
    runs-on: ubuntu-latest
    steps:
      # Always operate on main, even if the schedule fires from another
      # default branch — the leaderboard lives on main, period.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ingest seeds
        run: python -m grandgitmaster ingest seeds/repos.txt

      - name: Pull X watchlist
        run: python -m grandgitmaster x pull || true

      - name: Scouts (GitHub Trending + Hacker News, no keys needed)
        run: python -m grandgitmaster scout || true

      - name: Sleuth repos merely named in tweets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m grandgitmaster x sleuth || true

      - name: X search watcher (only if token configured)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          if [ -n "$X_BEARER_TOKEN" ]; then
            python -m grandgitmaster x watch || true
          else
            echo "No X_BEARER_TOKEN secret set — skipping X search mode"
          fi

      - name: Run the Ringer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m grandgitmaster ringer

      - name: Commit fresh leaderboard
        run: |
          git config user.name "the-ringer[bot]"
          git config user.email "ringer@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "👑 Ringer run: refresh leaderboard"
          git push origin HEAD:main
