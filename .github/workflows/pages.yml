# Publishes the cloud edition of the app (web/) by force-pushing it to the
# gh-pages branch. Creating a gh-pages branch auto-enables GitHub Pages, so
# this needs no manual settings step and no special API permissions.
# App URL: https://<owner>.github.io/GrandGitMaster/
name: Deploy app to Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish web/ to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd web
          touch .nojekyll
          git init -b gh-pages
          git config user.name "pages[bot]"
          git config user.email "pages@users.noreply.github.com"
          git add -A
          git commit -m "Deploy app $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
