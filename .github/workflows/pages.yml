# Deploys the cloud edition of the app (web/) to GitHub Pages.
# `enablement: true` auto-creates the Pages site on first run — no manual
# settings step needed. App URL: https://<owner>.github.io/GrandGitMaster/
name: Deploy app to Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/
      - id: deployment
        uses: actions/deploy-pages@v4
